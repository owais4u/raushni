# k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: raushni-secrets
  namespace: raushni
type: Opaque
data:
  # Base64 encoded values
  JWT_SECRET: <base64-encoded-secret>
  STRIPE_SECRET_KEY: <base64-encoded-key>
  DEEPGRAM_API_KEY: <base64-encoded-key>
  S3_ACCESS_KEY: <base64-encoded-key>
  S3_SECRET_KEY: <base64-encoded-key>