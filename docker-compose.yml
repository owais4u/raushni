version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build: ./database
    container_name: raushni-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/backups:/backups
    networks:
      - raushni_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: raushni-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - raushni_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: raushni-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/raushni_backend
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - raushni_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # CMS (Strapi)
  strapi:
    build:
      context: ./cms
      dockerfile: Dockerfile.dev
    container_name: raushni-strapi
    ports:
      - "1337:1337"
    volumes:
      - ./cms:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/raushni_cms
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - raushni_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: raushni-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_CMS_URL: http://localhost:1337
      NODE_ENV: development
    depends_on:
      - backend
      - strapi
    networks:
      - raushni_network

  # Nginx Reverse Proxy
  nginx:
    build: ./nginx
    container_name: raushni-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - strapi
    networks:
      - raushni_network

volumes:
  postgres_data:
  redis_data:

networks:
  raushni_network:
    driver: bridge