# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: raushni
      POSTGRES_USER: raushni_user
      POSTGRES_PASSWORD: raushni_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - raushni_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - raushni_network

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://raushni_user:raushni_password@postgres:5432/raushni
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - raushni_network

  python-service:
    build: ./services/document_generator
    ports:
      - "8000:8000"
    networks:
      - raushni_network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - raushni_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - raushni_network

volumes:
  postgres_data:

networks:
  raushni_network:
    driver: bridge